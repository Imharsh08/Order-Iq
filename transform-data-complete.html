<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform Data</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Data Transformation</h1>
    </header>
    <main>
        <section id="data-preview">
            <h2>Data Preview</h2>
            <div id="data-table"></div>
        </section>
        <section id="format-selection">
            <h2>Select Format</h2>
            <select id="format-dropdown">
                <option value="csv">CSV</option>
                <option value="excel">Excel</option>
                <option value="json">JSON</option>
            </select>
        </section>
        <section id="transformation-engine">
            <h2>Transformation Engine</h2>
            <textarea id="transformations" placeholder="Add your transformations here..."></textarea>
        </section>
        <section id="statistics-display">
            <h2>Statistics</h2>
            <div id="statistics"></div>
        </section>
        <section id="download-functionality">
            <h2>Download</h2>
            <button id="download-btn">Download</button>
        </section>
        <section id="ui-support">
            <h2>Drag and Drop Support</h2>
            <div id="drop-area">Drop files here</div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
